# ===========================================================================
# Missing tests — warning, category=test-gap
# ===========================================================================

[[cases]]
name = "new-function-no-tests"
description = "Public utility added with no test coverage and at least one error path."
expected_verdict_passed = true
diff = """
diff --git a/src/util.py b/src/util.py
@@
+def parse_duration(s: str) -> int:
+    \"\"\"Parse '10s' / '5m' / '2h' into seconds.\"\"\"
+    if s.endswith("s"):
+        return int(s[:-1])
+    if s.endswith("m"):
+        return int(s[:-1]) * 60
+    if s.endswith("h"):
+        return int(s[:-1]) * 3600
+    raise ValueError(f"unknown unit: {s}")
"""
findings = [
    { severity = "warning", category = "test-gap", message_keywords = ["test", "coverage", "missing"] },
]

# ===========================================================================
# Design — warning, category=design
# ===========================================================================

[[cases]]
name = "god-function"
description = "100+ line function mixing parsing, validation, IO, and notification."
expected_verdict_passed = true
diff = """
diff --git a/src/handler.py b/src/handler.py
@@
+def process_order(raw):
+    # parse
+    parts = raw.split(",")
+    if len(parts) != 8: raise ValueError("bad input")
+    item_id, qty_s, user_s, addr, city, zip_, email, notes = parts
+    # validate
+    if not item_id.startswith("ITM-"): raise ValueError("bad id")
+    qty = int(qty_s)
+    if qty < 1 or qty > 100: raise ValueError("bad qty")
+    user_id = int(user_s)
+    if "@" not in email: raise ValueError("bad email")
+    # lookup
+    conn = sqlite3.connect("orders.db")
+    cur = conn.cursor()
+    cur.execute("SELECT price FROM items WHERE id = ?", (item_id,))
+    row = cur.fetchone()
+    if not row: raise LookupError("no such item")
+    price = row[0]
+    total = price * qty
+    # write
+    cur.execute("INSERT INTO orders VALUES (?, ?, ?, ?, ?)",
+                (item_id, user_id, qty, total, addr))
+    conn.commit()
+    # notify
+    send_email(email, f"Order confirmed: ${total}")
+    log.info("processed order for %s", user_id)
+    return total
"""
findings = [
    { severity = "warning", category = "design", message_keywords = ["function", "responsibility", "extract", "long"] },
]

