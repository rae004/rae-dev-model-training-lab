# Phase 1 eval set — hand-authored diffs with reference findings.
#
# Used by `codereview eval` to score `review()` output against the
# off-the-shelf Ollama backend (the M8 baseline that any future Phase 2
# model must beat per ADR-005).
#
# Reference findings use only the (severity, category) tuple for matching
# per the proposed scoring methodology in src/codereview/eval.py. Optional
# `file` and `message_keywords` fields are documentation today; future
# stricter scoring may use them.
#
# Adding a case: pick something a real reviewer would flag (or shouldn't),
# write a minimal synthetic diff, and record the *blocking* finding(s).
# Keep cases small — readers should be able to score them by eye in ~30s.

# ===========================================================================
# Real bugs — should be flagged as severity=error, category=bug
# ===========================================================================

[[cases]]
name = "off-by-one-loop"
description = "Loop terminates one iteration short, missing the last element."
expected_verdict_passed = false
diff = """
diff --git a/src/sum.py b/src/sum.py
@@
-def total(xs):
-    s = 0
-    for i in range(len(xs)):
-        s += xs[i]
-    return s
+def total(xs):
+    s = 0
+    for i in range(len(xs) - 1):
+        s += xs[i]
+    return s
"""
findings = [
    { severity = "error", category = "bug", message_keywords = ["off-by-one", "loop", "last"] },
]

[[cases]]
name = "retry-on-auth-failure"
description = "API client retries 401 responses, masking a permanent auth failure."
expected_verdict_passed = false
diff = """
diff --git a/src/client.ts b/src/client.ts
@@
-async function fetchWithRetry(url: string) {
-  const res = await fetch(url);
-  if (!res.ok) throw new Error(res.statusText);
-  return res.json();
-}
+async function fetchWithRetry(url: string) {
+  for (let attempt = 0; attempt < 5; attempt++) {
+    const res = await fetch(url);
+    if (res.ok) return res.json();
+    await sleep(1000 * attempt);
+  }
+  throw new Error("exhausted retries");
+}
"""
findings = [
    { severity = "error", category = "bug", message_keywords = ["401", "retry", "auth", "fail-fast"] },
]

