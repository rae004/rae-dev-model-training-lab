# Review configuration.
#
# Defaults are the *(proposed)* values from ARCHITECTURE.md §4: change them
# here in config (CLAUDE.md rule 5), never silently in the schema or the
# architecture doc. Override individual fields via CLI flags
# (--threshold, --backend-url, --model).

threshold = "error"   # error | warning | info

[backend]
type        = "ollama"
base_url    = "http://workhorse:11434"
model       = "qwen2.5-coder"
timeout     = 60.0
temperature = 0.2
# num_thread: llama.cpp inference threads per request. Omit (or comment out) to
# let Ollama auto-pick. On the workhorse (i7-8700, 6c/12t) explicit 6–8 gives
# a measurable single-stream speedup; on hardware with stronger GPU offload
# this matters much less. Confirmed ~19% faster on workhorse with num_thread=8
# vs default on a short prompt.
# num_thread = 8
