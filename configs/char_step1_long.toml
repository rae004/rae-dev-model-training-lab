# Ablation: same architecture as char_step1, but trained for 2× steps.
# Shows whether val loss plateaus or keeps decreasing, and whether
# overfitting onset (train↓ val↑) becomes more pronounced.

[data]
corpus_paths = ["data/corpus.txt"]
val_fraction = 0.1

[model]
block_size = 128
n_layer = 4
n_head = 4
d_model = 128
dropout = 0.0

[optim]
learning_rate = 3e-4
min_learning_rate = 3e-5
weight_decay = 0.1
beta1 = 0.9
beta2 = 0.95
grad_clip = 1.0

[schedule]
warmup_steps = 200
max_steps = 10000    # was 5000

[loop]
batch_size = 64
eval_interval = 500   # was 250 — keeps the same total number of eval points
eval_iters = 50
log_interval = 100

[io]
out_dir = "runs/char_step1_long"
seed = 1337
device = "auto"
