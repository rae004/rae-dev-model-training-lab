# Ablation: half-size model — n_layer / n_head / d_model all halved.
# Same data, same steps as char_step1.toml. Shows how param count
# alone affects final loss and sample coherence.

[data]
corpus_paths = ["data/corpus.txt"]
val_fraction = 0.1

[model]
block_size = 128
n_layer = 2          # was 4
n_head = 2           # was 4
d_model = 64         # was 128
dropout = 0.0

[optim]
learning_rate = 3e-4
min_learning_rate = 3e-5
weight_decay = 0.1
beta1 = 0.9
beta2 = 0.95
grad_clip = 1.0

[schedule]
warmup_steps = 200
max_steps = 5000

[loop]
batch_size = 64
eval_interval = 250
eval_iters = 50
log_interval = 50

[io]
out_dir = "runs/char_step1_small"
seed = 1337
device = "auto"
