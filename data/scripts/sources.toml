# Phase 1 corpus sources (ADR-018).
#
# Allowed licenses for the public slice: MIT, Apache-2.0 only.
# Owner's own repositories are exempt from license filtering.
# Every entry below also has a row in data/SOURCES.md with
# license and pull date.
#
# Determinism notes:
#  - For `git` sources, prefer a tag or a commit SHA for `ref`. A branch
#    name (e.g. "main") drifts over time and breaks reproducibility.
#  - The corpus output is byte-identical across runs for a given file
#    set and this sources.toml — sources are sorted by `name`, files
#    within a source by relative POSIX path.

extensions = [".py", ".ts", ".tsx"]

# --- Owner repos (license-exempt per ADR-018) ---

[[sources]]
name = "ai-security-digest"
type = "path"
path = "~/projects/ai-security-digest"
license = "owner"

[[sources]]
name = "rae-budget"
type = "path"
path = "~/projects/rae-budget"
license = "owner"

[[sources]]
name = "rae-time-tracker-and-invoice"
type = "path"
path = "~/projects/rae-time-tracker-and-invoice"
license = "owner"

# --- Public slice (MIT/Apache-2.0 only per ADR-018) ---

[[sources]]
name = "fastapi"
type = "git"
url = "https://github.com/fastapi/fastapi.git"
ref = "master"
license = "MIT"

[[sources]]
name = "thealgorithms-python"
type = "git"
url = "https://github.com/TheAlgorithms/Python.git"
ref = "master"
license = "MIT"

[[sources]]
name = "typescript"
type = "git"
url = "https://github.com/microsoft/TypeScript.git"
ref = "main"
license = "Apache-2.0"
